# Jekyll configuration for GitHub Pages

title: Hermes Documentation
description: Self-hosted internet speed test monitoring with modern observability stack integration
url: https://hermes-docs.greenflametech.com
baseurl: ""

theme: jekyll-theme-hacker

# Navigation
navigation:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Architecture
    url: /architecture
  - title: API Reference
    url: /api-reference
  - title: Alerts
    url: /alerts
  - title: Security Guide
    url: /security
  - title: Security Audit
    url: /SECURITY-AUDIT
  - title: Security Enhancements
    url: /SECURITY-ENHANCEMENTS
  - title: Error Catalog
    url: /error-catalog
  - title: Error Handling Conventions
    url: /error-handling-conventions
  - title: Error Messages
    url: /error-messages
  - title: Release Process
    url: /RELEASE-PROCESS

# GitHub metadata
repository: fabell4/Hermes
github:
  repository_url: https://github.com/fabell4/hermes
  
# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-github-metadata
  - jekyll-relative-links

# Include files
include:
  - SECURITY-AUDIT.md
  - SECURITY-ENHANCEMENTS.md
  - RELEASE-PROCESS.md

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - Gemfile.lock
  - grafana-dashboard.json
  - suppression-decisions.md
  - zeniscal.yml
