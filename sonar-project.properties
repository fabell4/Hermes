sonar.projectKey=Hermes
sonar.projectName=Hermes
sonar.host.url=https://sonarqube.greenflametech.net
sonar.sources=src,frontend/src
sonar.tests=tests
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.bandit.reportPaths=bandit-report.json
sonar.python.mypy.reportPaths=mypy-report.txt
sonar.externalIssuesReportPaths=sonar-vulture.json,sonar-radon.json,sonar-semgrep.json
sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/logs/**,\
  **/*.pyc,\
  **/node_modules/**,\
  **/dist/**