services:

  hermes-scheduler:
    build: .
    container_name: hermes-scheduler
    restart: always
    command: ["python", "-m", "src.main"]

    volumes:
      - hermes-logs:/app/logs           # CSV result history + hermes.log
      - hermes-data:/app/data           # runtime_config.json, .run_trigger

    ports:
      - "${PROMETHEUS_PORT:-8000}:8000" # Prometheus /metrics endpoint

    environment:
      APP_ENV: "${APP_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-UTC}"
      SPEEDTEST_INTERVAL_MINUTES: "${SPEEDTEST_INTERVAL_MINUTES:-60}"
      RUN_ON_STARTUP: "${RUN_ON_STARTUP:-true}"
      ENABLED_EXPORTERS: "${ENABLED_EXPORTERS:-csv}"
      CSV_LOG_PATH: "logs/results.csv"
      PROMETHEUS_PORT: "${PROMETHEUS_PORT:-8000}"
      LOKI_URL: "${LOKI_URL:-}"
      LOKI_JOB_LABEL: "${LOKI_JOB_LABEL:-hermes_speedtest}"

    env_file:
      - path: .env
        required: false

  hermes-ui:
    build: .
    container_name: hermes-ui
    restart: always

    volumes:
      - hermes-logs:/app/logs           # Read CSV results written by scheduler
      - hermes-data:/app/data           # Shared runtime_config.json + .run_trigger

    ports:
      - "${UI_PORT:-8501}:8501"         # Streamlit UI

    environment:
      APP_ENV: "${APP_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      TZ: "${TZ:-UTC}"
      SPEEDTEST_INTERVAL_MINUTES: "${SPEEDTEST_INTERVAL_MINUTES:-60}"
      ENABLED_EXPORTERS: "${ENABLED_EXPORTERS:-csv}"
      CSV_LOG_PATH: "logs/results.csv"

    env_file:
      - path: .env
        required: false

    depends_on:
      - hermes-scheduler

volumes:
  hermes-logs:
    driver: local
  hermes-data:
    driver: local
