name: Link GHCR package to repository

# Triggered by the Forgejo release pipeline after it pushes the image to GHCR.
# Re-pushing via GITHUB_TOKEN causes GitHub to auto-link the package to this repo.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to link (e.g. 0.4.3.18-beta)"
        required: true
        type: string

jobs:
  link-package:
    name: Re-push image with GITHUB_TOKEN to link package
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and re-push to link package to this repo
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/hermes"
          docker pull "${IMAGE}:${{ inputs.version }}"
          docker push "${IMAGE}:${{ inputs.version }}"
          # Re-push latest too if it exists
          if docker pull "${IMAGE}:latest" 2>/dev/null; then
            docker push "${IMAGE}:latest"
          fi
          echo "Package re-pushed via GITHUB_TOKEN — it is now linked to ${{ github.repository }}"
