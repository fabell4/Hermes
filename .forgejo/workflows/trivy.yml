name: Trivy — Image Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  trivy-image:
    runs-on: docker
    timeout-minutes: 20
    env:
      REGISTRY: registry.greenflametech.net
      IMAGE_NAME: hermes
      LOKI_PUSH_URL: https://loki.greenflametech.net/loki/api/v1/push
      # Prometheus Pushgateway endpoint — adjust path if your gateway differs
      PUSHGATEWAY_URL: https://prometheus.greenflametech.net/metrics/job/trivy/instance/hermes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -qq docker.io curl jq wget ca-certificates

      - name: Build image for scanning
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -t "${REGISTRY}/${IMAGE_NAME}:scan-${SHA}" .
          echo "IMAGE_TAG=${REGISTRY}/${IMAGE_NAME}:scan-${SHA}" >> $GITHUB_ENV

      - name: Install Trivy
        run: |
          TRIVY_VERSION=$(curl -sf "https://api.github.com/repos/aquasecurity/trivy/releases/latest" \
            | grep -Po '"tag_name": "v\K[0-9.]+' | head -1)
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -O trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          chmod +x trivy

      - name: Scan image
        run: |
          ./trivy image \
            --format json \
            --output trivy-report.json \
            --exit-code 0 \
            "${{ env.IMAGE_TAG }}"

      - name: Ship findings to Loki
        if: always()
        run: |
          TS=$(date +%s%N)
          REPO="${{ github.repository }}"
          REF="${{ github.ref_name }}"
          SHA="${{ github.sha }}"

          # Build one Loki push payload — one log line per vulnerability (batched).
          # Falls back to a "clean scan" line if no vulnerabilities are found.
          PAYLOAD=$(jq -n \
            --arg ts "$TS" \
            --arg repo "$REPO" \
            --arg ref "$REF" \
            --arg sha "$SHA" \
            --slurpfile report trivy-report.json '
            ($report[0].Results // [])
            | [.[].Vulnerabilities // [] | .[]]
            | map({
                severity: .Severity,
                pkg:      .PkgName,
                id:       .VulnerabilityID,
                installed:.InstalledVersion,
                fixed:    (.FixedVersion  // "no-fix"),
                title:    (.Title         // "")
              } | @json)
            | if length == 0 then
                [{
                  stream: {job: "trivy", repo: $repo, ref: $ref, commit: $sha},
                  values: [[$ts, "trivy scan complete — no vulnerabilities found"]]
                }]
              else
                [{
                  stream: {job: "trivy", repo: $repo, ref: $ref, commit: $sha},
                  values: (map([$ts, .]))
                }]
              end
            | {streams: .}
          ')

          curl -sf -X POST "${LOKI_PUSH_URL}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Warning: Loki push failed (non-fatal)"

      - name: Push summary metrics to Prometheus Pushgateway
        if: always()
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPORT=trivy-report.json

          jq_count() {
            jq --arg sev "$1" \
              '[.Results[]?.Vulnerabilities[]? | select(.Severity==$sev)] | length' \
              "$REPORT" 2>/dev/null || echo 0
          }

          CRITICAL=$(jq_count CRITICAL)
          HIGH=$(jq_count HIGH)
          MEDIUM=$(jq_count MEDIUM)
          LOW=$(jq_count LOW)

          printf '# HELP trivy_vulnerabilities Vulnerability count by severity from Trivy image scan\n'  > metrics.txt
          printf '# TYPE trivy_vulnerabilities gauge\n'                                                >> metrics.txt
          printf 'trivy_vulnerabilities{severity="CRITICAL",commit="%s"} %s\n' "$SHA" "$CRITICAL"    >> metrics.txt
          printf 'trivy_vulnerabilities{severity="HIGH",commit="%s"}     %s\n' "$SHA" "$HIGH"        >> metrics.txt
          printf 'trivy_vulnerabilities{severity="MEDIUM",commit="%s"}   %s\n' "$SHA" "$MEDIUM"      >> metrics.txt
          printf 'trivy_vulnerabilities{severity="LOW",commit="%s"}      %s\n' "$SHA" "$LOW"         >> metrics.txt

          curl -sf --data-binary @metrics.txt "${PUSHGATEWAY_URL}" \
            || echo "Warning: Pushgateway push failed (non-fatal)"

      - name: Upload Trivy report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30
