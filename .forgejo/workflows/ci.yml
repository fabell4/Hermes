name: CI — Hermes

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:

  gitleaks:
    runs-on: docker
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          GL_VERSION=$(curl -s "https://api.github.com/repos/gitleaks/gitleaks/releases/latest" | grep -Po '"tag_name": "v\K[0-9.]+')
          wget -q -O gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${GL_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz && chmod +x gitleaks
          ./gitleaks detect --source . --report-path gitleaks-report.json --report-format json --verbose 2>&1 || true

      - name: Upload Gitleaks report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7

  test:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql+asyncpg://testuser:${{ secrets.TEST_DB_PASSWORD }}@test-db:5432/hermes_test
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx anyio psycopg2-binary pytest-json-report

      - name: Create test database
        run: |
          python -c "
          import psycopg2
          conn = psycopg2.connect(
            host='test-db', port=5432,
            user='testuser',
            password='${{ secrets.TEST_DB_PASSWORD }}',
            dbname='testdb'
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE DATABASE hermes_test;')
          conn.close()
          " || echo "DB exists, continuing"

      - name: Run tests
        run: |
          pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --json-report \
            --json-report-file=pytest-report.json \
            -v || true

      - name: Upload test reports
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: test-reports
          path: |
            coverage.xml
            pytest-report.json
          retention-days: 7

  ruff:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src --output-format json > ruff-lint-report.json 2>&1 || true

      - name: Ruff format check
        run: ruff format --check src > ruff-format-report.txt 2>&1 || true

      - name: Upload Ruff reports
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: ruff-reports
          path: |
            ruff-lint-report.json
            ruff-format-report.txt
          retention-days: 7

      - name: Fail if lint errors
        run: |
          ruff check src
          ruff format --check src

  mypy:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: MyPy check
        run: mypy src --ignore-missing-imports > mypy-report.txt 2>&1 || true

      - name: Upload MyPy report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 7

  bandit:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r src -f json -o bandit-report.json --exit-zero || true

      - name: Upload Bandit report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  semgrep:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto --json --output=semgrep-report.json src || true

      - name: Upload Semgrep report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 7

  safety:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Safety
        run: |
          pip install safety
          safety check -r requirements.txt --json --output safety-report.json || true

      - name: Upload Safety report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 7

  hadolint:
    runs-on: docker
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint
        run: |
          if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
            echo "Docker not available. Skipping hadolint." > hadolint-report.json
            exit 0
          fi
          docker run --rm -i hadolint/hadolint hadolint --format json \
            - < Dockerfile > hadolint-report.json || true

      - name: Upload Hadolint report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7

  radon:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Radon
        run: |
          pip install radon
          radon cc src -n C --json > radon-cc-report.json || true
          radon mi src --json > radon-mi-report.json || true
          radon hal src > radon-hal-report.txt || true

      - name: Upload Radon reports
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: radon-reports
          path: |
            radon-cc-report.json
            radon-mi-report.json
            radon-hal-report.txt
          retention-days: 7

  vulture:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Vulture
        run: |
          pip install vulture
          vulture src --min-confidence 80 > vulture-report.txt 2>&1 || true

      - name: Upload Vulture report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: vulture-report
          path: vulture-report.txt
          retention-days: 7

  trivy-deps:
    runs-on: docker
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.json
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload SBOM
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json
          retention-days: 7
  
  dependency-check:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.13-nodejs20
    timeout-minutes: 10
    continue-on-error: true
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Upload pip-audit report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: poc/pip-audit-report.json
          retention-days: 7

  sonarqube:
    runs-on: docker
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
    timeout-minutes: 20
    needs: [gitleaks, test, ruff, mypy, bandit, semgrep, safety, hadolint, radon, vulture, trivy-deps]
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Download all reports ---
      - name: Download test reports
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: test-reports
          path: .

      - name: Download bandit report
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: bandit-report
          path: .

      - name: Download mypy report
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: mypy-report
          path: .

      - name: Download vulture report
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: vulture-report
          path: .

      - name: Download radon reports
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: radon-reports
          path: .

      - name: Download semgrep report
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: semgrep-report
          path: .

      # --- Convert reports to SonarQube Generic Issue format ---
      - name: Convert reports to SonarQube format
        run: |
          python convert_to_sonar.py \
            --sonar-base-dir . \
            --mypy    mypy-report.txt \
            --vulture vulture-report.txt \
            --radon   radon-cc-report.json \
            --semgrep semgrep-report.json \
            --outdir  .

      # --- Scan ---
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          apt-get update -qq && apt-get install -y -qq unzip curl
          SCANNER_VERSION="6.2.1.4610"
          curl -sSLo sonar-scanner.zip \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip"
          unzip -q sonar-scanner.zip
          mv "sonar-scanner-${SCANNER_VERSION}-linux-x64" sonar-scanner-cli
          sonar-scanner-cli/bin/sonar-scanner \
            -Dsonar.projectBaseDir=. \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.host.url="${SONAR_HOST_URL}"

      - name: Quality Gate Check
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          python3 - <<'EOF'
          import os, sys, time, urllib.request, urllib.parse, json, base64

          host  = os.environ["SONAR_HOST_URL"].rstrip("/")
          token = os.environ["SONAR_TOKEN"]
          auth  = base64.b64encode(f"{token}:".encode()).decode()

          # Retrieve the task ID written by the scanner
          ce_task_id = None
          report_file = ".scannerwork/report-task.txt"
          if os.path.exists(report_file):
              with open(report_file) as f:
                  for line in f:
                      if line.startswith("ceTaskId="):
                          ce_task_id = line.strip().split("=", 1)[1]

          if not ce_task_id:
              print("No CE task ID found — skipping quality gate check.")
              sys.exit(0)

          headers = {"Authorization": f"Basic {auth}"}

          # Wait for analysis to finish (up to 4 min)
          for attempt in range(24):
              url = f"{host}/api/ce/task?id={urllib.parse.quote(ce_task_id)}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              status = data["task"]["status"]
              print(f"CE task status: {status}")
              if status in ("SUCCESS", "FAILED", "CANCELLED"):
                  break
              time.sleep(10)
          else:
              print("Timed out waiting for analysis to complete.")
              sys.exit(1)

          if status != "SUCCESS":
              print(f"Analysis task ended with status: {status}")
              sys.exit(1)

          # Check the quality gate
          analysis_id = data["task"].get("analysisId", "")
          url = f"{host}/api/qualitygates/project_status?analysisId={urllib.parse.quote(analysis_id)}"
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              qg = json.loads(resp.read())

          gate_status = qg["projectStatus"]["status"]
          print(f"Quality Gate: {gate_status}")
          if gate_status != "OK":
              sys.exit(1)
          EOF

  trivy-image:
    runs-on: docker
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    needs: [sonarqube]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "docker already on PATH: $(command -v docker)"
          else
            mkdir -p "$HOME/.local/bin"
            curl -fsSLo docker.tgz \
              "https://download.docker.com/linux/static/stable/x86_oxy/docker-27.3.1.tgz"
            tar -xzf docker.tgz --strip-components=1 -C "$HOME/.local/bin" docker/docker
            rm docker.tgz
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          docker info

      - name: Build Docker image
        run: docker build -t hermes:${{ github.sha }} .

      - name: Ensure Trivy CLI available
        run: |
          if command -v trivy >/dev/null 2>&1; then
            echo "trivy already on PATH: $(command -v trivy)"
          else
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sh -s -- -b /usr/local/bin v0.59.1
          fi

      - name: Trivy image scan
        env:
          TRIVY_SERVER_URL: ${{ secrets.TRIVY_SERVER_URL }}
        run: |
          trivy image \
            --server "${TRIVY_SERVER_URL}" \
            --format json \
            --output trivy-image-results.json \
            --severity CRITICAL \
            --exit-code 1 \
            hermes:${{ github.sha }}

      - name: Ship Trivy image results to Loki log
        if: always()
        run: |
          if [ ! -f trivy-image-results.json ]; then
            echo "No trivy-image-results.json found, skipping"
            exit 0
          fi
          jq -c --arg project "${{ github.repository }}" \
                 --arg branch "${{ github.ref_name }}" \
                 --arg commit "${{ github.sha }}" \
                 --arg scan_type "image" '
            .Results[]? | .Vulnerabilities[]? | {
              time: now,
              project: $project,
              branch: $branch,
              commit: $commit,
              scan_type: $scan_type,
              severity: .Severity,
              pkg: .PkgName,
              cve: .VulnerabilityID,
              installed: .InstalledVersion,
              fixed: .FixedVersion
            }
          ' trivy-image-results.json >> /var/log/trivy-findings.log || true

      - name: Upload Trivy image report
        if: always()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: trivy-image-report
          path: trivy-image-results.json
          retention-days: 90

      - name: Push to registry
        run: |
          docker tag hermes:${{ github.sha }} registry.greenflametech.net/hermes:${{ github.sha }}
          docker tag hermes:${{ github.sha }} registry.greenflametech.net/hermes:latest
          docker push registry.greenflametech.net/hermes:${{ github.sha }}
          docker push registry.greenflametech.net/hermes:latest
          
