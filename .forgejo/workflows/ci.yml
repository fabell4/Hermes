name: CI — Hermes

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:

  gitleaks:
    runs-on: local
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v $(pwd):/path \
            zricethezav/gitleaks:latest \
            detect \
            --source=/path \
            --exit-code=1

  test:
    runs-on: local
    env:
      DATABASE_URL: postgresql+asyncpg://testuser:${{ secrets.TEST_DB_PASSWORD }}@test-db:5432/hermes_test
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx anyio psycopg2-binary

      - name: Create test database
        run: |
          python -c "
          import psycopg2
          conn = psycopg2.connect(
            host='test-db', port=5432,
            user='testuser',
            password='${{ secrets.TEST_DB_PASSWORD }}',
            dbname='testdb'
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('CREATE DATABASE hermes_test;')
          conn.close()
          " || echo "DB exists, continuing"

      - name: Run tests
        run: |
          pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 1

  ruff:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Ruff lint
        run: |
          pip install ruff
          ruff check src --output-format=github

      - name: Run Ruff format check
        run: ruff format --check src

  mypy:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run MyPy
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy
          mypy src --ignore-missing-imports

  bandit:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r src -f json -o bandit-report.json --exit-zero

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 1

  semgrep:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-report.json \
            src || true

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 1

  safety:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Safety
        run: |
          pip install safety
          safety check \
            -r requirements.txt \
            --json \
            --output safety-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 1

  hadolint:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        run: |
          docker run --rm \
            -i hadolint/hadolint \
            hadolint \
            --format json \
            - < Dockerfile > hadolint-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 1

  radon:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Radon complexity check
        run: |
          pip install radon
          radon cc src -n C --json > radon-report.json || true
          radon cc src -n C

      - uses: actions/upload-artifact@v4
        with:
          name: radon-report
          path: radon-report.json
          retention-days: 1

  vulture:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Vulture
        run: |
          pip install vulture
          vulture src --min-confidence 80 || true

  trivy-deps:
    runs-on: local
    steps:
      - uses: actions/checkout@v4

      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.json
          severity: CRITICAL
          exit-code: 1
          trivy-server-url: ${{ secrets.TRIVY_SERVER_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 1

  sonarqube:
    runs-on: local
    needs: [gitleaks, test, ruff, mypy, bandit, semgrep, safety, hadolint, radon, vulture, trivy-deps]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Download bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  dependency-track:
    runs-on: local
    needs: [trivy-deps]
    steps:
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Upload SBOM to Dependency Track
        run: |
          curl -s -X POST https://owasp.greenflametech.net/api/v1/bom \
            -H "X-Api-Key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}" \
            -H "Content-Type: multipart/form-data" \
            -F "autoCreate=true" \
            -F "projectName=hermes" \
            -F "projectVersion=${{ github.ref_name }}" \
            -F "bom=@sbom.json"

  trivy-image:
    runs-on: local
    if: github.ref == 'refs/heads/main'
    needs: [sonarqube]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hermes:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: hermes:${{ github.sha }}
          format: cyclonedx
          output: sbom-image.json
          severity: CRITICAL
          exit-code: 1
          trivy-server-url: ${{ secrets.TRIVY_SERVER_URL }}

      - name: Upload image SBOM to Dependency Track
        run: |
          curl -s -X POST https://owasp.greenflametech.net/api/v1/bom \
            -H "X-Api-Key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}" \
            -H "Content-Type: multipart/form-data" \
            -F "autoCreate=true" \
            -F "projectName=hermes-image" \
            -F "projectVersion=${{ github.ref_name }}" \
            -F "bom=@sbom-image.json"

      - name: Push to registry
        run: |
          docker tag hermes:${{ github.sha }} registry.greenflametech.net/hermes:${{ github.sha }}
          docker tag hermes:${{ github.sha }} registry.greenflametech.net/hermes:latest
          docker push registry.greenflametech.net/hermes:${{ github.sha }}
          docker push registry.greenflametech.net/hermes:latest

  # ZAP scan is commented out until a running Hermes instance is available
  # zap:
  #   runs-on: local
  #   if: github.ref == 'refs/heads/main'
  #   needs: [trivy-image]
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: ZAP API Scan
  #       run: |
  #         docker run --rm \
  #           -v $(pwd):/zap/wrk:rw \
  #           ghcr.io/zaproxy/zaproxy:stable \
  #           zap-api-scan.py \
  #           -t https://hermes.greenflametech.net/openapi.json \
  #           -f openapi \
  #           -r zap-report.html \
  #           -z "-addoninstall communityScripts" || true
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: zap-report
  #         path: zap-report.html
  #         retention-days: 7

  publish-docs:
    runs-on: local
    if: github.ref == 'refs/heads/main'
    needs: [sonarqube]
    steps:
      - uses: actions/checkout@v4

      - name: Install NFS client
        run: |
          apt-get update -qq
          apt-get install -y nfs-common rsync

      - name: Install Zensical and plugins
        run: |
          pip install zensical mkdocs-kroki-plugin

      - name: Build docs
        run: zensical build -f docs/zensical.yml

      - name: Sync docs to NFS
        env:
          NFS_SERVER: ${{ secrets.NFS_SERVER }}
          NFS_MKDOCS_PATH: ${{ secrets.NFS_MKDOCS_PATH }}
        run: |
          mkdir -p /mnt/docs
          mount -t nfs4 -o rw,hard,intr \
            ${NFS_SERVER}:${NFS_MKDOCS_PATH} /mnt/docs
          rsync -av --delete site/ /mnt/docs/hermes/
          umount /mnt/docs

  notify:
    runs-on: local
    if: always()
    needs: [gitleaks, test, ruff, mypy, bandit, semgrep, safety, hadolint, radon, vulture, trivy-deps, sonarqube, dependency-track, trivy-image, publish-docs]
    steps:
      - name: Notify success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          curl -s -X POST https://ntfy.greenflametech.net/pipeline-alerts \
            -H "Title: Hermes Pipeline Passed ✅" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -d "Pipeline passed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"

      - name: Notify failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          curl -s -X POST https://ntfy.greenflametech.net/pipeline-alerts \
            -H "Title: Hermes Pipeline Failed ❌" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Pipeline failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}. Check Forgejo Actions for details."