  publish-docs:
    runs-on: docker
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    needs: [sonarqube]
    container:
      image: nikolaik/python-nodejs:python3.11-nodejs20
      volumes:
        - mkdocs_content:/mkdocs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zensical and plugins
        run: pip install zensical mkdocs-kroki-plugin

      - name: Build docs
        run: zensical build -f docs/zeniscal.yml

      - name: Publish docs to volume
        run: |
          rsync -av --delete site/ /mkdocs/hermes/

  notify:
    runs-on: docker
    if: always()
    needs: [gitleaks, test, ruff, mypy, bandit, semgrep, safety, hadolint, radon, vulture, trivy-deps, sonarqube, trivy-image, publish-docs]
    steps:
      - name: Notify success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          curl -s -X POST https://ntfy.greenflametech.net/pipeline-alerts \
            -H "Title: Hermes Pipeline Passed ✅" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -d "Pipeline passed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"

      - name: Notify failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          curl -s -X POST https://ntfy.greenflametech.net/pipeline-alerts \
            -H "Title: Hermes Pipeline Failed ❌" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Pipeline failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}. Check Forgejo Actions for details."