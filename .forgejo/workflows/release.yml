name: Release — Hermes

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0-alpha)"
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: docker
    timeout-minutes: 30
    container:
      image: registry.greenflametech.net/gft-ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' for image tag (v0.1.0-alpha -> 0.1.0-alpha)
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        run: |
          python3 - <<'PYEOF'
import re, os

version = os.environ['VERSION']
try:
    content = open('CHANGELOG.md').read()
    pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
    m = re.search(pattern, content, re.DOTALL)
    notes = m.group(1).strip() if m else ''
except Exception:
    notes = ''

with open('/tmp/changelog_notes.txt', 'w') as f:
    f.write(notes)
PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Log in to private registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login registry.greenflametech.net \
              --username "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | \
            docker login ghcr.io \
              --username "${{ secrets.GH_USERNAME }}" \
              --password-stdin

      - name: Build image
        run: |
          docker build \
            --tag registry.greenflametech.net/hermes:${{ steps.version.outputs.version }} \
            --tag registry.greenflametech.net/hermes:latest \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest \
            .

      - name: Push to private registry
        run: |
          docker push registry.greenflametech.net/hermes:${{ steps.version.outputs.version }}
          docker push registry.greenflametech.net/hermes:latest

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest

      - name: Push tag to public GitHub repo
        run: |
          git config user.email "ci@greenflametech.net"
          git config user.name "Hermes CI"
          git fetch --unshallow origin || true
          git remote add github https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_USERNAME }}/hermes.git
          git push github HEAD:refs/heads/main --force
          git push github ${{ steps.version.outputs.tag }} --force

      - name: Create GitHub release
        run: |
          python3 - <<'PYEOF'
import json, os, subprocess, sys

tag     = os.environ['TAG']
version = os.environ['VERSION']
gh_user = os.environ['GH_USERNAME']
gh_pat  = os.environ['GH_PAT']
is_pre  = any(x in tag for x in ('alpha', 'beta', 'rc'))

try:
    notes = open('/tmp/changelog_notes.txt').read().strip()
except Exception:
    notes = ''

docker_line = f'**Docker image:** `docker pull ghcr.io/{gh_user}/hermes:{version}`'
body = f'{notes}\n\n---\n\n{docker_line}' if notes else docker_line

payload = {'tag_name': tag, 'name': tag, 'prerelease': is_pre, 'body': body}

with open('/tmp/gh_release_payload.json', 'w') as f:
    json.dump(payload, f)

base_url = f'https://api.github.com/repos/{gh_user}/hermes/releases'
headers  = ['-H', f'Authorization: Bearer {gh_pat}', '-H', 'Content-Type: application/json']

r = subprocess.run(
    ['curl', '-s', '-o', '/tmp/gh_response.json', '-w', '%{http_code}',
     '-X', 'POST', *headers, base_url, '-d', '@/tmp/gh_release_payload.json'],
    capture_output=True, text=True)
code = r.stdout.strip()

if code == '422':
    r2 = subprocess.run(
        ['curl', '-fsSL', *headers, f'{base_url}/tags/{tag}'],
        capture_output=True, text=True)
    release_id = json.loads(r2.stdout)['id']
    subprocess.run(
        ['curl', '-fsSL', '-X', 'PATCH', *headers,
         f'{base_url}/{release_id}', '-d', '@/tmp/gh_release_payload.json'],
        check=True)
elif code not in ('200', '201'):
    print(f'GitHub release API returned HTTP {code}', file=sys.stderr)
    sys.exit(1)
PYEOF
        env:
          TAG:         ${{ steps.version.outputs.tag }}
          VERSION:     ${{ steps.version.outputs.version }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT:      ${{ secrets.GH_PAT }}

      - name: Create Forgejo release
        uses: https://data.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: /tmp/release-assets
          token: ${{ secrets.FORGEJO_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
