name: Release ΓÇö Hermes

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0-alpha)"
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: docker
    timeout-minutes: 30
    container:
      image: registry.greenflametech.net/gft-ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' for image tag (v0.1.0-alpha -> 0.1.0-alpha)
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        run: python3 scripts/extract_changelog.py
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login docker.io \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

      - name: Log in to private registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login registry.greenflametech.net \
              --username "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | \
            docker login ghcr.io \
              --username "${{ secrets.GH_USERNAME }}" \
              --password-stdin

      - name: Security gate — dependency vulnerability scan
        run: |
          # Bootstrap pip — try ensurepip, then apt (with a fresh package list), then get-pip.py
          if ! python3 -m pip --version >/dev/null 2>&1; then
            python3 -m ensurepip --upgrade 2>/dev/null || true
          fi
          if ! python3 -m pip --version >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y --no-install-recommends python3-pip || true
          fi
          if ! python3 -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/get-pip.py | python3 -
          fi
          # Debian bookworm enforces PEP 668 (externally-managed-environment).
          # This is a throwaway CI container so --break-system-packages is safe.
          python3 -m pip install --quiet --break-system-packages pip-audit
          python3 -m pip_audit -r requirements.txt
          echo "pip-audit passed — no known vulnerabilities in dependencies"

      - name: Build image
        run: |
          docker build \
            --tag registry.greenflametech.net/hermes:${{ steps.version.outputs.version }} \
            --tag registry.greenflametech.net/hermes:latest \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest \
            .

      - name: Push to private registry
        run: |
          docker push registry.greenflametech.net/hermes:${{ steps.version.outputs.version }}
          docker push registry.greenflametech.net/hermes:latest

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest

      - name: Push tag to public GitHub repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.email "ci@greenflametech.net"
          git config user.name "Hermes CI"
          git fetch --unshallow origin 2>/dev/null || true

          # Create a sanitized branch ΓÇö strips internal infra before pushing to the public repo
          git checkout -b public-release

          # Remove internal-only files/directories not suitable for public consumption
          rm -rf .forgejo/
          rm -f renovate.json

          # Rewrite Dockerfile ΓÇö restore public Docker Hub base image
          sed -i 's|FROM registry\.greenflametech\.net/python:3\.13-slim|FROM python:3.13-slim|g' Dockerfile

          # Strip internal sonar.host.url (sonar-project.properties is otherwise useful as a reference)
          sed -i '/^sonar\.host\.url=/d' sonar-project.properties

          # Commit the sanitized state
          git add -A
          git commit -m "chore: prepare public release ${TAG} (strip internal infra config)"

          GITHUB_REPO_URL="https://${GH_USERNAME}:${GH_PAT}@github.com/${GH_USERNAME}/Hermes.git"
          git remote add github "${GITHUB_REPO_URL}"
          git push github public-release:refs/heads/main --force

          # Tag the sanitized commit and push to GitHub
          git tag -f "${TAG}"
          curl -s -X DELETE \
            -H "Authorization: Bearer ${GH_PAT}" \
            "https://api.github.com/repos/${GH_USERNAME}/Hermes/git/refs/tags/${TAG}" || true
          git push github "${TAG}"

          # Clean up ΓÇö remove the github remote and temp branch (detached HEAD, no need to re-checkout main)
          git remote remove github || true
          git branch -D public-release || true

      - name: Create GitHub release
        run: python3 scripts/create_github_release.py
        env:
          TAG:           ${{ steps.version.outputs.tag }}
          VERSION:       ${{ steps.version.outputs.version }}
          GH_USERNAME:   ${{ secrets.GH_USERNAME }}
          GH_PAT:        ${{ secrets.GH_PAT }}
          NOTES_FILE:    /tmp/changelog_notes.txt
          PAYLOAD_FILE:  /tmp/gh_release_payload.json
          RESPONSE_FILE: /tmp/gh_response.json

      - name: Delete existing Forgejo release (if any)
        env:
          TAG: ${{ steps.version.outputs.tag }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          REPO_API="${{ github.server_url }}/api/v1/repos/${{ github.repository }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${REPO_API}/releases/tags/${TAG}" | jq -r '.id // empty')
          if [ -n "${RELEASE_ID}" ]; then
            echo "Deleting existing release id=${RELEASE_ID} for tag ${TAG}"
            curl -s -X DELETE -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${REPO_API}/releases/${RELEASE_ID}"
          else
            echo "No existing release found for tag ${TAG}"
          fi

      - name: Create Forgejo release
        uses: https://data.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: /tmp/release-assets
          token: ${{ secrets.FORGEJO_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
