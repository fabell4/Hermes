name: Release — Hermes

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0-alpha)"
        required: true
        type: string

defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Job 1: validate
#   All quality and security gates. If any step fails the entire release
#   pipeline aborts here — nothing is built or published externally.
#
# Job 2: build-and-push
#   Builds the Docker image and pushes to the internal private registry and
#   GHCR. Runs only after validate succeeds. This is the internal/near-prod
#   artefact that can be tested before the public release is cut.
#
# Job 3: publish-public
#   Sanitizes the repo (strips internal infra), pushes the release branch and
#   tag to the public GitHub repo, creates the GitHub + Forgejo releases, and
#   updates the GitHub Pages source. Runs only after build-and-push succeeds.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # Job 1 — Validate: all gates that must pass before anything leaves Forgejo
  # -------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: docker
    timeout-minutes: 20
    container:
      image: registry.greenflametech.net/gft-python-runner:latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff — lint and format check
        run: |
          pip install ruff
          ruff check src
          ruff format --check src

      - name: Bandit — security scan
        run: |
          pip install bandit
          bandit -r src -ll

      - name: pip-audit — dependency vulnerability scan
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends python3-full
          python3 -m pip install --quiet --break-system-packages pip-audit
          python3 -m pip_audit -r requirements.txt
          echo "pip-audit passed — no known vulnerabilities"

      - name: pytest — unit tests
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx anyio
          pytest --cov=src --cov-fail-under=80 -q

      - name: Validate Jekyll docs build
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends ruby-full build-essential zlib1g-dev
          gem install bundler --no-document --quiet
          cd docs && bundle install --quiet
          bundle exec jekyll build --destination /tmp/jekyll-build
          echo "Jekyll build passed"

  # -------------------------------------------------------------------------
  # Job 2 — Build and push: internal artefacts only (private registry + GHCR)
  # -------------------------------------------------------------------------
  build-and-push:
    name: Build and push (internal)
    runs-on: docker
    timeout-minutes: 30
    needs: validate
    container:
      image: registry.greenflametech.net/gft-ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract changelog notes
        run: python3 scripts/extract_changelog.py
        env:
          VERSION: ${{ needs.validate.outputs.version }}

      - name: Upload changelog notes artifact
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: changelog-notes
          path: /tmp/changelog_notes.txt
          retention-days: 1

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login docker.io \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

      - name: Log in to private registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login registry.greenflametech.net \
              --username "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GH_PAT }}" | \
            docker login ghcr.io \
              --username "${{ secrets.GH_USERNAME }}" \
              --password-stdin

      - name: Build image
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          docker build \
            --build-arg APP_VERSION="${{ needs.validate.outputs.version }}" \
            --label org.opencontainers.image.source="https://github.com/${GH_USERNAME}/Hermes" \
            --label org.opencontainers.image.version="${{ needs.validate.outputs.version }}" \
            --label org.opencontainers.image.revision="${{ github.sha }}" \
            --label org.opencontainers.image.created="${CREATED}" \
            --tag registry.greenflametech.net/hermes:${{ needs.validate.outputs.version }} \
            --tag registry.greenflametech.net/hermes:latest \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ needs.validate.outputs.version }} \
            --tag ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest \
            .

      - name: Push to private registry
        run: |
          docker push registry.greenflametech.net/hermes:${{ needs.validate.outputs.version }}
          docker push registry.greenflametech.net/hermes:latest

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:${{ needs.validate.outputs.version }}
          docker push ghcr.io/${{ secrets.GH_USERNAME }}/hermes:latest

      - name: Make GHCR package public
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          HTTP=$(curl -s -o /tmp/pkg_resp.json -w "%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/hermes" \
            -d '{"visibility":"public"}')
          echo "PATCH /user/packages/container/hermes → HTTP ${HTTP}"
          if [ "${HTTP}" != "200" ]; then
            echo "Response body:"; cat /tmp/pkg_resp.json
            echo "Warning: could not set package visibility via API — set it manually in GitHub package settings."
          fi

  # -------------------------------------------------------------------------
  # Job 3 — Publish public: sanitize + push to GitHub, create releases,
  #          update GitHub Pages source.
  # -------------------------------------------------------------------------
  publish-public:
    name: Publish (public)
    runs-on: docker
    timeout-minutes: 20
    needs: [validate, build-and-push]
    container:
      image: registry.greenflametech.net/gft-ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download changelog notes artifact
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: changelog-notes
          path: /tmp

      - name: Push sanitized release to public GitHub repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          git config user.email "ci@greenflametech.net"
          git config user.name "Hermes CI"
          git fetch --unshallow origin 2>/dev/null || true

          # Remove branch protection from main — this repo is a CI-managed mirror;
          # no PR workflow is needed and protection blocks the CI push.
          HTTP_PROT=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_USERNAME}/Hermes/branches/main/protection")
          echo "DELETE branch protection → HTTP ${HTTP_PROT}"

          git checkout -b public-release

          # Remove internal-only files/directories
          rm -rf .forgejo/
          rm -f renovate.json

          # Restore public Docker Hub base image
          sed -i 's|FROM registry\.greenflametech\.net/python:3\.13-slim|FROM python:3.13-slim|g' Dockerfile

          # Strip internal sonar.host.url
          sed -i '/^sonar\.host\.url=/d' sonar-project.properties

          git add -A
          git commit -m "chore: prepare public release ${TAG} (strip internal infra config)"

          GITHUB_REPO_URL="https://${GH_USERNAME}:${GH_PAT}@github.com/${GH_USERNAME}/Hermes.git"
          git remote add github "${GITHUB_REPO_URL}"

          # Push sanitized code to main (public repo is a CI-managed mirror)
          git push github public-release:refs/heads/main --force

          # Create/update the release tag
          git tag -f "${TAG}"
          curl -s -X DELETE \
            -H "Authorization: Bearer ${GH_PAT}" \
            "https://api.github.com/repos/${GH_USERNAME}/Hermes/git/refs/tags/${TAG}" || true
          git push github "${TAG}"

          git remote remove github || true
          git branch -D public-release || true

      - name: Create GitHub release
        run: python3 scripts/create_github_release.py
        env:
          TAG:           ${{ needs.validate.outputs.tag }}
          VERSION:       ${{ needs.validate.outputs.version }}
          GH_USERNAME:   ${{ secrets.GH_USERNAME }}
          GH_PAT:        ${{ secrets.GH_PAT }}
          NOTES_FILE:    /tmp/changelog_notes.txt
          PAYLOAD_FILE:  /tmp/gh_release_payload.json
          RESPONSE_FILE: /tmp/gh_response.json

      - name: Update GitHub Pages source
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          PAGES_URL="https://api.github.com/repos/${GH_USERNAME}/Hermes/pages"
          PAYLOAD="{\"source\":{\"branch\":\"main\",\"path\":\"/docs\"}}"
          AUTH_HEADER="Authorization: Bearer ${GH_PAT}"
          CT_HEADER="Content-Type: application/json"

          # Try POST first (initialises Pages on a fresh repo)
          HTTP=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" -X POST \
            -H "${AUTH_HEADER}" -H "${CT_HEADER}" \
            "${PAGES_URL}" -d "${PAYLOAD}")
          echo "POST /pages → HTTP ${HTTP}"

          if [ "${HTTP}" = "201" ]; then
            echo "GitHub Pages enabled on main/docs"
          elif [ "${HTTP}" = "409" ] || [ "${HTTP}" = "422" ]; then
            # Pages already exists — update the source branch
            HTTP2=$(curl -s -o /tmp/pages_resp2.json -w "%{http_code}" -X PUT \
              -H "${AUTH_HEADER}" -H "${CT_HEADER}" \
              "${PAGES_URL}" -d "${PAYLOAD}")
            echo "PUT /pages → HTTP ${HTTP2}"
            [ "${HTTP2}" = "204" ] || { cat /tmp/pages_resp2.json; exit 1; }
            echo "GitHub Pages source updated to main/docs"
          else
            cat /tmp/pages_resp.json
            exit 1
          fi

      - name: Prepare Forgejo release assets
        run: |
          mkdir -p /tmp/release-assets
          if [ -f /tmp/changelog_notes.txt ]; then
            cp /tmp/changelog_notes.txt /tmp/release-assets/RELEASE-NOTES.md
          fi

      - name: Delete existing Forgejo release (if any)
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          REPO_API="${{ github.server_url }}/api/v1/repos/${{ github.repository }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${FORGEJO_TOKEN}" \
            "${REPO_API}/releases/tags/${TAG}" | jq -r '.id // empty')
          if [ -n "${RELEASE_ID}" ]; then
            echo "Deleting existing release id=${RELEASE_ID} for tag ${TAG}"
            curl -s -X DELETE -H "Authorization: token ${FORGEJO_TOKEN}" \
              "${REPO_API}/releases/${RELEASE_ID}"
          else
            echo "No existing release found for tag ${TAG}"
          fi

      - name: Create Forgejo release
        uses: https://data.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: /tmp/release-assets
          token: ${{ secrets.FORGEJO_TOKEN }}
          tag: ${{ needs.validate.outputs.tag }}
          prerelease: ${{ contains(needs.validate.outputs.tag, 'alpha') || contains(needs.validate.outputs.tag, 'beta') || contains(needs.validate.outputs.tag, 'rc') }}
